<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ummul Presents</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:#f4f6f8;
}

.hero{
    background:linear-gradient(135deg,#ff4d6d,#ff8fa3);
    color:white;
    text-align:center;
    padding:60px 20px;
}

.hero h1{font-size:40px;margin:0;}
.hero p{font-style:italic;margin-top:10px;}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    padding:20px;
}

.card{
    background:white;
    width:260px;
    margin:15px;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{transform:translateY(-6px);}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card h3{text-align:center;margin:10px 0 5px;}
.price{text-align:center;color:#ff4d6d;font-weight:bold;}

.order{
    display:block;
    text-align:center;
    background:#25D366;
    color:white;
    padding:10px;
    margin:10px;
    border-radius:25px;
    text-decoration:none;
    font-weight:bold;
}

.footer{
    text-align:center;
    padding:30px;
    font-style:italic;
    color:#444;
}

.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    font-size:28px;
    padding:15px;
    border-radius:50%;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="hero">
    <h1>Ummul Presents</h1>
    <p>تحفے محبت بڑھایا کرتے ہیں ❤️</p>
</div>

<div class="container">

    <!-- PRODUCT 1 -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f">
        <h3>Photo Frame</h3>
        <p class="price">Rs 1200</p>
        <a class="order" href="https://wa.me/923058997763?text=I want Photo Frame">Order on WhatsApp</a>
    </div>

    <!-- PRODUCT 2 -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1504198453319-5ce911bafcde">
        <h3>Gift Box</h3>
        <p class="price">Rs 1500</p>
        <a class="order" href="https://wa.me/923058997763?text=I want Gift Box">Order on WhatsApp</a>
    </div>

    <!-- PRODUCT 3 -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1519710164239-da123dc03ef4">
        <h3>Custom Gift</h3>
        <p class="price">Rs 2000</p>
        <a class="order" href="https://wa.me/923058997763?text=I want Custom Gift">Order on WhatsApp</a>
    </div>

</div>

<div class="footer">
    تحفے محبت بڑھایا کرتے ہیں ❤️
</div>

<a class="whatsapp" href="https://wa.me/923058997763" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>

</body>
</html>
